name: Mod7 Proyecto Liga - Extract & Load

on:
  schedule:
  - cron: '0 8 * * *' # Se ejecuta todos los días a las 08:00 AM UTC
  workflow_dispatch:
    # Permite ejecutar el pipeline manualmente desde la web

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Autenticar en Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/491062167747/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-pipeline-sa@mod7-proyecto-liga.iam.gserviceaccount.com'

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de extracción y carga
      env:
        GCS_BUCKET_NAME: "mod7-proyecto-liga-bronze"
        FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      run: |
        # Ejecutar el orquestador
        python scripts/load.py

    - name: Notificar éxito
      if: success()
      run: echo "✅ Pipeline ejecutado correctamente. Los datos se han cargado en la capa Bronze."

    - name: Notificar fallo
      if: failure()
      run: echo "❌ Error en la ejecución del pipeline. Revisa los logs para más detalles."
