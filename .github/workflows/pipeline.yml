name: Mod7 Proyecto Liga - Extract & Load

on:
  schedule:
  - cron: '0 8 * * *' # Se ejecuta todos los días a las 08:00 AM UTC
  workflow_dispatch:
    # Permite ejecutar el pipeline manualmente desde la web

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Autenticar en Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/1084996365203/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-pipeline-sa@mci506-futbol-europeo.iam.gserviceaccount.com'

    - name: Configurar Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "numpy<2.0.0"

    - name: Ejecutar script de extracción y carga
      env:
        GCS_BUCKET_NAME: "mci506-futbol-europeo-bronze"
        FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      run: |
        # Ejecutar el orquestador
        python scripts/load.py

    - name: Transformar y Agregar en BigQuery (Silver & Gold)
      run: |
        echo "Ejecutando transformaciones Silver..."
        bq query --use_legacy_sql=false --project_id=mci506-futbol-europeo < sql/silver_transform.sql
        echo "Ejecutando agregaciones Gold..."
        bq query --use_legacy_sql=false --project_id=mci506-futbol-europeo < sql/gold_agreggations.sql

    - name: Notificar éxito
      if: success()
      run: echo "✅ Pipeline ejecutado correctamente. Los datos están listos en las capas Bronze, Silver y Gold."

    - name: Notificar fallo
      if: failure()
      run: echo "❌ Error en la ejecución del pipeline. Revisa los logs para más detalles."
